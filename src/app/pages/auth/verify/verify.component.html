<ion-header class="ion-no-border">
  <ion-toolbar color="light">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/auth/login" color="dark"></ion-back-button>
    </ion-buttons>
    <div class="toolbar-brand">
      <img src="assets/logo-credifacil.svg" alt="Credifácil" class="logo-svg" />
    </div>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="verify-container">
    <div class="hero-section">
      <div class="hero-graphic">
        <div class="hero-circle"></div>
        <div class="hero-lock-icon">
          <ion-icon name="shield-checkmark"></ion-icon>
        </div>
      </div>
      <h1 class="hero-title">Código de verificación</h1>
      <p class="hero-subtitle">Ingresa el código de 6 dígitos que enviamos a tu Telegram</p>
    </div>

    <div class="code-section">
      <div class="code-label">Código de 6 dígitos</div>
      <div class="code-inputs">
        <div
          *ngFor="let _ of code; let i = index; trackBy: trackByIndex"
          class="code-digit-wrapper"
          [class.filled]="code[i] !== ''"
          [class.focused]="focusedIndex === i"
        >
          <ion-input
            [id]="'code-' + i"
            type="tel"
            maxlength="1"
            class="code-digit"
            [(ngModel)]="code[i]"
            (ionInput)="onCodeInput(i, $event)"
            (keyup)="onCodeInput(i, $event)"
            (keydown)="onKeyDown(i, $event)"
            (ionFocus)="focusedIndex = i"
            (ionBlur)="focusedIndex = -1"
            [disabled]="isLoading"
            inputmode="numeric"
          ></ion-input>
        </div>
      </div>

      <div *ngIf="errorMessage" class="error-message">
        <ion-icon name="alert-circle" size="small"></ion-icon>
        <span>{{ errorMessage }}</span>
      </div>

      <ion-button
        expand="block"
        class="verify-button"
        (click)="verify()"
        [disabled]="isLoading || code.join('').length !== 6"
      >
        <ion-spinner *ngIf="isLoading" name="crescent" slot="start"></ion-spinner>
        {{ isLoading ? 'Verificando...' : 'Verificar identidad' }}
      </ion-button>

      <div class="divider">
        <span></span>
      </div>

      <div class="resend-section">
        <div class="telegram-info">
          <div class="telegram-icon">
            <ion-icon name="paper-plane"></ion-icon>
          </div>
          <div class="telegram-text">
            <strong>Código enviado por Telegram</strong>
            <p *ngIf="resendCooldown > 0">Reenviar en {{ resendCooldown }}s</p>
          </div>
        </div>
        <ion-button
          fill="clear"
          size="small"
          class="resend-button"
          (click)="resendCode()"
          [disabled]="resendCooldown > 0 || isLoading"
        >
          <ion-icon name="refresh-outline" slot="start"></ion-icon>
          Reenviar código
        </ion-button>
      </div>
    </div>
  </div>
</ion-content>
